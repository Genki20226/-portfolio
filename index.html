<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS読み込み -->
  <link rel="stylesheet" href="style.css">

  <title>小緑玄輝 ポートフォリオ</title>
</head>

<body>

<div class="profile-card">

  <img
    class="profile-img"
    src="https://i.ibb.co/6GkLnxn/IMG-2354.jpg"
    alt="プロフィール画像">

  <h1>小緑玄輝</h1>

  <p class="job">
    Webエンジニアを目指して勉強中
  </p>

  <p class="intro">
    📍大阪府<br><br>

    未経験からWebエンジニアを目指し、
    HTML・CSS・JavaScriptを独学で学習しています。<br><br>

    GitHubを使ってポートフォリオを公開しています。
  </p>

  <h2>スキル</h2>

  <div class="card">
    <h3>HTML</h3>

    <div class="bar">
      <div class="html"></div>
    </div>
  </div>

  <div class="card">
    <h3>CSS</h3>

    <div class="bar">
      <div class="css"></div>
    </div>
  </div>

  <div class="card">
    <h3>JavaScript</h3>

    <div class="bar">
      <div class="js"></div>
    </div>
  </div>

  <h2>制作実績</h2>

  <div class="card">
    <h3>プロフィールサイト</h3>

    <p>
      HTML・CSSのみで作成した自己紹介ページです。
    </p>
  </div>

  <div class="card">
    <h3>今後追加予定</h3>

    <p>
      ・電卓<br>
      ・ToDoリスト<br>
      ・タイマー<br>
      ・ストップウォッチ
    </p>
  </div>

  <button onclick="window.open('https://github.com/Genki20226')">
    GitHubを見る
  </button>

  <button onclick="location.href='mailto:あなたのメールアドレス@gmail.com'">
    お問い合わせ
  </button>

</div>

</body>
</html>
